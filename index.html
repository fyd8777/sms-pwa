<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMS생성기">
<meta name="theme-color" content="#1a3a5c">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>산성특수여객 SMS 생성기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
.wrap { max-width: 420px; margin: 0 auto; padding: 1rem; }
.card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
.card-header { background: #1a3a5c; padding: 14px 16px; }
.card-header p { color: #fff; font-size: 15px; font-weight: 600; }
.card-header span { color: #a8c4e0; font-size: 12px; }
.field-row { display: flex; align-items: center; padding: 11px 14px; border-bottom: 0.5px solid #f0f0f0; gap: 10px; }
.field-row:last-child { border-bottom: none; }
.field-label { font-size: 13px; color: #666; min-width: 72px; font-weight: 500; }
.field-row input { flex: 1; border: none; background: transparent; font-size: 14px; color: #222; outline: none; padding: 0; font-family: inherit; }
.field-row input::placeholder { color: #bbb; }
.phone-wrap { flex: 1; display: flex; align-items: center; gap: 4px; }
.phone-prefix { font-size: 14px; color: #222; font-weight: 500; white-space: nowrap; }
.phone-sep { font-size: 14px; color: #999; }
.phone-input { border: none; background: transparent; font-size: 14px; color: #222; outline: none; padding: 0; font-family: inherit; width: 48px; text-align: center; }
.phone-input::placeholder { color: #bbb; }
.section-divider { padding: 8px 14px 4px; font-size: 11px; color: #999; font-weight: 600; letter-spacing: 0.5px; background: #fafafa; border-bottom: 0.5px solid #f0f0f0; }
.preview-box { background: #f9f9f9; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.preview-box pre { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; color: #333; white-space: pre-wrap; line-height: 1.8; }
.btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
.btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
.btn-copy { background: #1a3a5c; color: #fff; }
.btn-reset { background: #f0f0f0; color: #666; }
.toast { display: none; text-align: center; font-size: 13px; color: #2e7d32; padding: 8px; background: #e8f5e9; border-radius: 8px; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="card-header">
      <p>산성특수 여객</p>
      <span>SMS 발송 내용 입력</span>
    </div>

    <div class="section-divider">일정</div>
    <div class="field-row">
      <input type="text" id="f0" placeholder="제목 입력" style="font-size:15px; font-weight:600; width:100%;" />
    </div>
    <div class="field-row">
      <span class="field-label">발인일</span>
      <input type="date" id="f1" />
    </div>
    <div class="field-row">
      <span class="field-label">발인장</span>
      <input type="text" id="f2" placeholder="장례식장명 입력" />
    </div>
    <div class="field-row">
      <span class="field-label">대기</span>
      <input type="text" id="f3" placeholder="예) 07:30" />
    </div>
    <div class="field-row">
      <span class="field-label">발인</span>
      <input type="text" id="f4" placeholder="예) 08:00" />
    </div>

    <div class="section-divider">장소</div>
    <div class="field-row">
      <span class="field-label">화장장</span>
      <input type="text" id="f5" placeholder="화장장명 입력" />
    </div>
    <div class="field-row">
      <span class="field-label">장지</span>
      <input type="text" id="f6" placeholder="장지명 입력" />
    </div>

    <div class="section-divider">차량</div>
    <div class="field-row">
      <span class="field-label">버스</span>
      <input type="text" id="f7" placeholder="예) 45인승 1대" />
    </div>
    <div class="field-row">
      <span class="field-label"></span>
      <div class="phone-wrap">
        <span class="phone-prefix">010</span>
        <span class="phone-sep">-</span>
        <input type="tel" class="phone-input" id="f9a" maxlength="4" placeholder="0000" inputmode="numeric" />
        <span class="phone-sep">-</span>
        <input type="tel" class="phone-input" id="f9b" maxlength="4" placeholder="0000" inputmode="numeric" />
      </div>
    </div>
    <div class="field-row">
      <span class="field-label">리무진</span>
      <input type="text" id="f8" placeholder="예) 리무진 1대" />
    </div>
    <div class="field-row">
      <span class="field-label"></span>
      <div class="phone-wrap">
        <span class="phone-prefix">010</span>
        <span class="phone-sep">-</span>
        <input type="tel" class="phone-input" id="f10a" maxlength="4" placeholder="0000" inputmode="numeric" />
        <span class="phone-sep">-</span>
        <input type="tel" class="phone-input" id="f10b" maxlength="4" placeholder="0000" inputmode="numeric" />
      </div>
    </div>
  </div>

  <div class="preview-box">
    <pre id="preview">내용을 입력하면 미리보기가 표시됩니다.</pre>
  </div>

  <div class="btn-row">
    <button class="btn btn-copy" onclick="copySMS()">복사하기</button>
    <button class="btn btn-reset" onclick="resetAll()">초기화</button>
  </div>
  <div class="toast" id="toast">클립보드에 복사되었습니다!</div>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}

const fields = [
  { id: 'f1', label: '발인일', isDate: true },
  { id: 'f2', label: '발인장', isDate: false },
  { id: 'f3', label: '대   기', isDate: false },
  { id: 'f4', label: '발   인', isDate: false },
  { id: 'f5', label: '화장장', isDate: false },
  { id: 'f6', label: '장   지', isDate: false },
  { id: 'f7', label: '버   스', isDate: false },
  { id: 'f9', label: '', isDate: false, isPhone: true, parts: ['f9a','f9b'] },
  { id: 'f8', label: '리무진', isDate: false },
  { id: 'f10', label: '', isDate: false, isPhone: true, parts: ['f10a','f10b'] },
];

function formatDate(val) {
  if (!val) return '';
  const [y, m, d] = val.split('-');
  return y + '년 ' + m + '월 ' + d + '일';
}

function getPhoneVal(parts) {
  const a = document.getElementById(parts[0]).value;
  const b = document.getElementById(parts[1]).value;
  if (!a && !b) return '';
  return '010-' + (a || '____') + '-' + (b || '____');
}

function updatePreview() {
  const title = document.getElementById('f0').value;
  const vals = fields.map(f => {
    let v;
    if (f.isPhone) {
      v = getPhoneVal(f.parts);
    } else {
      v = document.getElementById(f.id).value;
      if (f.isDate && v) v = formatDate(v);
    }
    return { label: f.label, val: v };
  });
  const hasAny = title || vals.some(f => f.val);
  if (!hasAny) {
    document.getElementById('preview').textContent = '내용을 입력하면 미리보기가 표시됩니다.';
    return;
  }
  let lines = ['안녕하세요\n산성특수 여객입니다.\n\n▶' + (title || '')];
  vals.forEach(f => {
    lines.push('▶' + f.label + ' : ' + (f.val || ''));
  });
  document.getElementById('preview').textContent = lines.join('\n');
}

document.getElementById('f0').addEventListener('input', updatePreview);

fields.forEach(f => {
  if (f.isPhone) {
    f.parts.forEach((pid, idx) => {
      const el = document.getElementById(pid);
      el.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
        if (this.value.length === 4 && idx === 0) {
          document.getElementById(f.parts[1]).focus();
        }
        updatePreview();
      });
    });
  } else {
    document.getElementById(f.id).addEventListener('input', updatePreview);
  }
});

function copySMS() {
  const text = document.getElementById('preview').textContent;
  if (text === '내용을 입력하면 미리보기가 표시됩니다.') return;
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2000);
  } catch(e) {}
  document.body.removeChild(ta);
}

function resetAll() {
  document.getElementById('f0').value = '';
  fields.forEach(f => {
    if (f.isPhone) {
      f.parts.forEach(pid => { document.getElementById(pid).value = ''; });
    } else {
      document.getElementById(f.id).value = '';
    }
  });
  updatePreview();
}
</script>
</body>
</html>
